name: Performance Regression (Lighthouse CI)

# Fails the build when mobile FCP/LCP/TBT/CLS exceed agreed thresholds
# against the deployed production URL. Runs on pushes to main, all PRs,
# and on a daily schedule so production drift gets surfaced even when
# nobody is shipping code.
#
# Thresholds (median of 3 runs, mobile, Slow 4G + 4x CPU slowdown):
#   - FCP ≤ 3000 ms
#   - LCP ≤ 4000 ms
#   - TBT ≤ 1500 ms
#   - CLS ≤ 0.1
# Adjust in lighthouserc.json — keep thresholds and CI in lockstep.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 13 * * *' # 13:00 UTC daily
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse mobile budget
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse against production
        run: lhci autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci
          retention-days: 14